<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="ai-income-logomark.png">
<title>VIP Registration Closed - AI Income Challenge</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Ogg';src:url('https://cdn.shopify.com/s/files/1/0550/8115/5765/t/36/assets/Ogg-Regular.woff2') format('woff2');font-weight:400;font-display:swap}
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#D4A853;--dark:#1A1816;--cream:#FAF8F5;--warmDark:#2A2520}
body{font-family:'Satoshi',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 40%,rgba(212,168,83,0.1) 0%,transparent 60%),radial-gradient(ellipse at 30% 80%,rgba(42,37,32,0.8) 0%,transparent 50%);pointer-events:none}

.wrap{text-align:center;padding:40px 24px;position:relative;z-index:1}
.logo{width:160px;margin:0 auto 48px;display:block;filter:brightness(0) invert(1)}
h1{font-family:'Ogg',serif;font-size:2.4rem;font-weight:400;margin-bottom:12px;color:var(--cream)}
.sub{font-size:1.1rem;color:#b0a99e;margin-bottom:48px;line-height:1.5}

.loader{position:relative;width:52px;height:52px;margin:0 auto 24px}
.orbit{position:absolute;inset:0;border:2px solid transparent;border-radius:50%}
.orbit:nth-child(1){border-top-color:var(--gold);animation:spin 1.5s linear infinite}
.orbit:nth-child(2){inset:8px;border-right-color:var(--gold);opacity:0.6;animation:spin 2s linear infinite reverse}
.orbit:nth-child(3){inset:16px;border-bottom-color:var(--gold);opacity:0.3;animation:spin 2.5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.redirect-text{font-size:0.95rem;color:#807a72;margin-bottom:32px}
.manual-link{font-size:0.9rem;color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(212,168,83,0.3);transition:border-color 0.2s}
.manual-link:hover{border-color:var(--gold)}

@media(max-width:600px){
  h1{font-size:1.8rem}
  .logo{width:130px;margin-bottom:36px}
}
</style>
</head>
<body>
<div class="wrap">
  <img src="ai-income-os-logo.png" alt="AI Income OS" class="logo">
  <h1>VIP Registration is Closed</h1>
  <p class="sub">Redirecting you to the next best thing...</p>
  <div class="loader">
    <div class="orbit"></div>
    <div class="orbit"></div>
    <div class="orbit"></div>
  </div>
  <p class="redirect-text">Redirecting you now...</p>
  <a href="https://startwithbailey.com" class="manual-link">Click here if you're not redirected</a>
</div>
<script>
setTimeout(function(){ window.location.href = 'https://startwithbailey.com'; }, 3000);
</script>
</body>
</html>
